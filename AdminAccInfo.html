<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Account - Loadzy</title>
  <link rel="stylesheet" href="AdminAccInfo.css" />
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Loadzy Logo" />
      <div class="title">
        <strong>LOADZY</strong><br />
        <span>LOAD. ROUTE. DELIVER</span>
      </div>


    </div>

    <div class="c">
    <div class="nav">
      <div onclick="location.href='AdminDashboard.html'" class="nav-item  one  d-flex flex-row">
        <img src="world.png" class="img1">
        <p class="tt">DASHBOARD</p>
        
      
    </div>
    <div onclick="location.href='AdminTrips.html'" class="nav-item two d-flex flex-row"><img src="asigntrip.png" class="img1"><p class="tt">PENDING TRIPS</p></div>
      <div onclick="location.href='AdminOps.html'" class="nav-item three d-flex flex-row"><img src="mng-op.png" class="img1"><p class="tt"> MANAGE OPERATOR</p></div>
      <div onclick="location.href='AdminDriver.html'" class="nav-item five d-flex flex-row"><img src="mng-driv.png" class="img1"><p class="tt"> MANAGE DRIVER</p></div>
      
    </div>

    <div class="bottom-nav">
      <div class="nav-item  active three d-flex flex-row"><img src="account (2).png" class="img1"><p class="tt"> ACCOUNT</p></div>
      <div class="nav-item four d-flex flex-row" id="logoutButton"><img src="logout.png" class="img1"><p class="tt">LOGOUT</p></div>
    </div>
  </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="account-card">
      <div class="account-left">
        <h2>ACCOUNT INFORMATION</h2>

        <form>
  <div class="form-grid">
    <!-- Column 1 -->
    <div class="col-1">
      <div class="form-group">
        <label for="fullname">
          FULL NAME
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="fullname" value="FAHAD" readonly />
      </div>
      <div class="form-group">
        <label for="email">
          EMAIL ID
          <img class="edit" src="pen.png">
        </label>
        <input type="email" id="email" value="fahad_123@gmail.com" readonly />
      </div>
      <div class="form-group">
        <label for="phone">
          PHONE NUMBER
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="pan" value="9608275872" readonly />
      </div>
      <div class="form-group">
        <label for="license">
          PAN NUMBER
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="license" value="XXXXXXXXX" readonly />
      </div>
      <div class="form-group">
        <label for="vehicle">
          HIGHEST DEGREE PURSUED
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="vehicle" value="BCOM, MTECH" readonly />
      </div>
    </div>

    <!-- Column 2 -->
    <div class="col-2">
        <div class="form-group">
        <label for="address">
          LOCATION TO SUPERVISE
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="address" value="TAMIL NADU" readonly />
      </div>
      <div class="form-group">
        <label for="address">
          ADDRESS
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="address" value="TAMBARAM, CHENNAI" readonly />
      </div>
      <div class="form-group">
        <label for="username">
         USERNAME
          <img class="edit" src="pen.png">
        </label>
        <input type="text" id="username" value="USER_4617" readonly />
      </div>
      <div class="form-group">
        <label for="password">
          PASSWORD
          <img class="edit" src="pen.png">
        </label>
        <input type="password" id="password" value="*************" readonly />
      </div>
      
    </div>
  </div>
</form>
<button class="save-btn">SAVE</button>


      </div>

      <div class="account-right">
        <img src="account (2).png"  class="profile" />
        
      </div>
      <button class="change-photo">CHANGE PHOTO</button>
    </div>
  </div>


  <div class="photo-modal" id="photoModal">
  <div class="modal-box">
    <span class="close-btn" id="closeModal">&#8592;</span>
    <div class="photo-options">
      <div class="option">
        <img src="camera.png" alt="Camera Icon" />
        <button>Camera</button>
      </div>
      <div class="option">
        <img src="gallery.png" alt="Gallery Icon" />
        <button>Gallery</button>
      </div>
    </div>
  </div>
</div>




<script src="loadzy-api.js"></script>
<script src="account-api.js"></script>
<script src="AdminAccInfo.js"></script>


<div id="toast" class="toast">SAVED</div>


  
 


<script src="user-header.js"></script>
</body>
</html>
