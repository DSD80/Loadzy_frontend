<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basic Information - Loadzy</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="BasicInfoDriver.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">

</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="Loadzy Logo">
    <div class="title">
      <strong>LOADZY</strong><br>
      <span>LOAD. ROUTE. DELIVER</span>
    </div>


  </div>

  <div class="container">
    <form class="info-box" action="AdminDashboard.html" method="get">
      <h2>BASIC INFORMATION</h2>

      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="email">Email ID</label>
      <input type="email" id="email" required>

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" required>

      <label for="pan">Pan Number</label>
      <input type="text" id="pan" required>

      <label for="degree">Highest Degree Pursued</label>
      <input type="text" id="degree" required>

      <label for="location">Location they supervise</label>
      <input type="text" id="location" required>

      <label for="address">Address</label>
      <input type="text" id="address" required>
   

 


      <button type="submit">Submit</button>
      
    </form>
  </div>
<script src="loadzy-api.js"></script>
<script src="basic-info.js"></script>
<script src="user-header.js"></script>
</body>
</html>
