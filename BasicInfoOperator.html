<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Basic Information - Loadzy</title>
  <link rel="stylesheet" href="BasicInfoOperator.css">
   <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="Loadzy Logo">
    <div class="title">
      <strong>LOADZY</strong><br>
      <span>LOAD. ROUTE. DELIVER</span>
    </div>


  </div>

  <div class="container">
    <form class="info-box">
      <h2>BASIC INFORMATION</h2>

      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" required>

      <label for="email">Email ID</label>
      <input type="email" id="email" required>

      <label for="orgname">Organization name</label>
      <input type="text" id="orgname" required>

      <label for="orgaddress">Address of Organization</label>
      <input type="text" id="orgaddress" required>

      <label for="pan">Pan Number</label>
      <input type="text" id="pan" required>

      <button type="submit">Submit</button>
    </form>
  </div>
<script src="loadzy-api.js"></script>
<script src="basic-info.js"></script>
<script src="user-header.js"></script>
</body>
</html>
