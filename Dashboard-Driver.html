<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Driver dashboard overview - Loadzy logistics platform" />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Driver Dashboard - Loadzy</title>
  <link rel="stylesheet" href="Dashboard-Driver.css">
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
 
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
  <link rel="stylesheet" href="driver-shared.css" />
  <link rel="stylesheet" href="Dashboard-Driver.css" />
</head>
<body>

<img onclick="location.href='DriverAccountInfo.html'" src="account and dash.png" alt="Top Right Image" class="top-right-image">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Loadzy Logo">
      <div class="title">
        <strong>LOADZY</strong><br>
        <span>LOAD. ROUTE. DELIVER</span>
      </div>
    </div> 
  
    <div class="c">
      <div class="nav">
        <div onclick="location.href='Dashboard-Driver.html'" class="nav-item active one d-flex flex-row">
          <img src="world.png" class="img1">
          <p class="tt">DASHBOARD</p>
        </div>
        <div onclick="location.href='Dashboard_AssignedTrips-Driver.html'" class="nav-item two d-flex flex-row">
          <img src="notepad.png" class="img1">
          <p class="tt">ASSIGNED TRIPS</p>
        </div>
        <div onclick="location.href='Dashboard_CompletedTrips-Driver.html'" class="nav-item three d-flex flex-row">
          <img src="icon1.png" class="img1">
          <p class="tt">COMPLETED TRIPS</p>
        </div>
        <div onclick="location.href='canceltrips.html'" class="nav-item five d-flex flex-row">
          <img src="icon3.png" class="img1">
          <p class="tt">CANCELLED TRIPS</p>
        </div>
        <div onclick="location.href='Helpdesk.html'" class="nav-item six d-flex flex-row">
          <img src="help desk.png" class="img1">
          <p class="tt">HELP DESK</p>
        </div>
      </div>

      <div class="bottom-nav">
        <div onclick="location.href='DriverAccountInfo.html'" class="nav-item three d-flex flex-row">
          <img src="account (2).png" class="img1">
          <p class="tt">ACCOUNT</p>
        </div>
        <div onclick="location.href='index.html'" class="nav-item four d-flex flex-row">
          <img src="logout.png" class="img1">
          <p class="tt">LOGOUT</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="page-header">
      <div>
        <h1 id="dash-welcome">Welcome back, Driver!</h1>
        <p class="page-subtitle">
          Here's a quick overview of your trips
        </p>
      </div>
    </div>

    <!-- OVERVIEW CARDS -->
    <div class="overview-grid">

      <a class="overview-card" href="Dashboard_AssignedTrips-Driver.html">
       

        <div class="ov-body">
          <div class="ov-label">Assigned Trips</div>
          <div class="ov-count" id="count-assigned">0</div>
        </div>
      </a>

      <a class="overview-card green"
         href="Dashboard_CompletedTrips-Driver.html">

        

        <div class="ov-body">
          <div class="ov-label">Completed Trips</div>
          <div class="ov-count" id="count-completed">0</div>
        </div>

      </a>

      <a class="overview-card red"
         href="canceltrips.html">


        <div class="ov-body">
          <div class="ov-label">Cancelled Trips</div>
          <div class="ov-count" id="count-cancelled">0</div>
        </div>

      </a>

    </div>

   

  </main>

  <script src="loadzy-api.js"></script>
  <script src="user-header.js"></script>

  <script>

    let idleTime = 0;
    const maxIdleSeconds = 100;

    document.addEventListener("DOMContentLoaded", async () => {

      const user = LoadzyAPI.user();

      const name =
        user?.profile?.name ||
        user?.username ||
        "Driver";

      const nameEl =
        document.getElementById("sidebar-driver-name");

      const welcomeEl =
        document.getElementById("dash-welcome");

      if (nameEl) nameEl.textContent = name;

      if (welcomeEl) {
        welcomeEl.textContent =
          `Welcome back, ${name}!`;
      }

      try {

        const { trips } =
          await LoadzyAPI.request("/api/trips");

        document.getElementById("count-assigned").textContent =
          trips.filter(t =>
            ["assigned", "in_transit"].includes(t.status)
          ).length;

        document.getElementById("count-completed").textContent =
          trips.filter(t =>
            t.status === "completed"
          ).length;

        document.getElementById("count-cancelled").textContent =
          trips.filter(t =>
            t.status === "cancelled"
          ).length;

      } catch (err) {
        console.error(err);
      }

    });

    setInterval(() => {

      idleTime++;

      if (idleTime >= maxIdleSeconds) {
        showIdleWarning();
      }

    }, 1000);

    ["mousemove", "keydown", "click", "scroll", "touchstart"]
      .forEach(event => {

        document.addEventListener(event, () => {
          idleTime = 0;
        });

      });

    function showIdleWarning() {

      if (document.querySelector(".idle-warning"))
        return;

      const warning =
        document.createElement("div");

      warning.className = "idle-warning";

      warning.innerHTML = `
        <p>You’ve been inactive for a while. Still there?</p>
        <button onclick="closeIdleWarning()">
          Yes, I'm here
        </button>
      `;

      document.body.appendChild(warning);

    }

    function closeIdleWarning() {

      const warning =
        document.querySelector(".idle-warning");

      if (warning) {
        warning.remove();
      }

      idleTime = 0;

    }

  </script>

</body>
</html>
