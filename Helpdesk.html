<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Help Desk - Loadzy</title>
  <link rel="stylesheet" href="Helpdesk.css" />
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Loadzy Logo">
      <div class="title">
        <strong>LOADZY</strong><br>
        <span>LOAD. ROUTE. DELIVER</span>
      </div>
    </div>

    <div class="c">
      <div class="nav">
        <div onclick="location.href='Dashboard-Driver.html'" class="nav-item one d-flex flex-row">
          <img src="world.png" class="img1"><p class="tt"> DASHBOARD</p>
        </div>
        <div class="nav-item active two d-flex flex-row">
          <img src="help desk.png" class="img1"><p class="tt"> HELP DESK</p>
        </div>
      </div>

      <div class="bottom-nav">
        <div onclick="location.href='DriverAccountInfo.html'" class="nav-item three d-flex flex-row">
          <img src="account (2).png" class="img1"><p class="tt"> ACCOUNT</p>
        </div>
        <div class="nav-item four d-flex flex-row " id="logoutButton">
          <img src="logout.png" class="img1"><p class="tt"> LOGOUT</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="main-chat">
     <div class="trip-cards">
      <div class="trip-card expanded">
    <div class="chat-header">
      <img src="phone.png" class="call-icon">
      <img src="more.png" class="menu-icon">
    </div>

    <div class="chat-body">
      <div class="chat-message orange">Can’t reach<span class="time">10.30pm</span></div>
      <div class="chat-message orange">Poor road condition<span class="time">10.30pm</span></div>

      <div class="chat-message map-message">
        <img src="map.png" class="map-img">
        <div class="chat-message yellow">Follow this route<span class="time">10.33pm</span></div>
      </div>
    </div>

    <div class="chat-input">
      <img src="emoji.png" class="emoji">
      <img src="attach.png" class="emoji">
      <input type="text" placeholder="Type a message">
      <img src="send arrow.png" class="attach">
      <img src="voice.png" class="send">
    </div>
  </div>
  </div>
    </div>


    <script src="loadzy-api.js"></script>
    <script src="http://localhost:5000/socket.io/socket.io.js"></script>
    <script src="helpdesk.js"></script>
    <script>
   document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.getElementById('logoutButton');

    logoutBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const confirmLogout = confirm("Are you sure you want to log out?");
      if (confirmLogout) {
        window.location.href = "index.html";
      }
    });
  });

</script>


</body>
</html>
