<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Login Operator- Loadzy</title>
  <link rel="stylesheet" href="Login-Op.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">
    <img src="logo.png" alt="Loadzy Logo">
    <div class="title">
      <strong>LOADZY</strong><br>
      <span>LOAD. ROUTE. DELIVER</span>
    </div>
  </div>

  <div class="container">
    <form class="login-box">
      <h2>LOGIN</h2>

      <label for="username">Username</label>
      <input type="text" id="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" required>

      <button onclick="location.href='opdash.html'" type="submit">Login</button>

      <p class="signup-link">
        Don’t have an account? <a onclick="location.href='Signup-Op.html'">Sign up</a>
      </p>
    </form>
  </div>
</body>
</html>
