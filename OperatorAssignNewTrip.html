<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Operator Assign New Trip — LOADZY</title>
  <link rel="stylesheet" href="OperatorAssignNewTrip.css">
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Loadzy Logo">
      <div class="title">
        <strong>LOADZY</strong><br>
        <span>LOAD. ROUTE. DELIVER</span>
      </div>
    </div>
    <img src="account and dash.png" alt="Top Right Image" class="top-right-image">

    <div class="c">
      <div class="nav">
        <div onclick="location.href='opdash.html'" class="nav-item one d-flex flex-row">
          <img src="dairy.png" class="img1">
          <p class="tt">HISTORY OF TRIPS</p>
        </div>
        <div onclick="location.href='OperatorCurrentTrips.html'" class="nav-item two d-flex flex-row">
          <img src="notepad.png" class="img1"><p class="tt"> CURRENT TRIPS</p>
        </div>
        <div onclick="location.href='OperatorStatusOfVehicle.html'" class="nav-item five d-flex flex-row">
          <img src="vehicle.png" class="img1"><p class="tt"> STATUS OF VEHICLES</p>
        </div>
        <div class="nav-item six active d-flex flex-row">
          <img src="add.png" class="img1"><p class="tt"> ASSIGN NEW TRIPS</p>
        </div>
      </div>

      <div class="bottom-nav">
        <div onclick="location.href='OperatorAccountInfo.html'" class="nav-item three d-flex flex-row">
          <img src="account (2).png" class="img1"><p class="tt"> ACCOUNT</p>
        </div>
        <div onclick="location.href='index.html'" class="nav-item four d-flex flex-row">
          <img src="logout.png" class="img1"><p class="tt">LOGOUT</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2>ASSIGN NEW TRIPS</h2>
    <form class="trip-form">
      <div class="form-group">
        <label>Load Type</label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Load Weight</label>
        <input type="text" />
      </div>

      <div class="form-group large">
        <label>Pick Up (Address)</label>
        <input type="text" />
      </div>

      <div class="form-group small">
        <label>Pick Up Date</label>
        <input type="date" />
      </div>

      <div class="form-group small">
        <label>Drop Date</label>
        <input type="date" />
      </div>

      <div class="form-group large">
        <label>Drop (Address)</label>
        <input type="text" />
      </div>

      <div class="form-group small">
        <label>Pick Up Time</label>
        <input type="time" />
      </div>

      <div class="form-group small">
        <label>Drop Time</label>
        <input type="time" />
      </div>

      <div class="form-group">
        <label>Vehicle Type needed</label>
        <select>
          <option>Select</option>
          <option>Mini Truck</option>
          <option>Pickup Van</option>
          <option>Container Truck</option>
          <option>Tanker</option>
          <option>Flatbed Truck</option>
          <option>Refrigerated Truck</option>
        </select>
      </div>

      <div class="form-group">
        <label>Payment Mode</label>
        <select>
          <option>Select</option>
          <option>Cash</option>
          <option>UPI</option>
          <option>Bank Transfer</option>
          <option>Cheque</option>
          <option>Credit</option>
          <option>Wallet</option>
        </select>
      </div>

      <div class="submit-container">
        <button type="submit" class="submit-btn">SUBMIT</button>
      </div>
    </form>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">SUBMITTED</div>
  <audio id="submit-sound" src="notify.mp3" preload="auto"></audio>

  <script src="OperatorAssignNewTrip.js"></script>

</body>
</html>
