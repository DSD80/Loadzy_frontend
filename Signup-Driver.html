<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Loadzy Sign Up</title>
  <link rel="stylesheet" href="Signup-Driver.css">

  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+SC&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">
    <img src="logo.png" alt="Loadzy Logo">
    <div class="title">
      <strong>LOADZY</strong><br>
      <span>LOAD. ROUTE. DELIVER</span>
    </div>
  </div>

  <div class="container">
    <form class="signup-box">
      <h2>SIGN UP</h2>

      <label for="username">Username</label>
      <input type="text" id="username" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" required>

      <label for="password">Create Password</label>
      <input type="password" id="password" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" required>

      <button onclick="location.href='BasicInfoDriver.html'" type="submit">Create Account</button>
    </form>
  </div>
</body>
</html>
