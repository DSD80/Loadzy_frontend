<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png" />
  <title>Cancelled Trips - Loadzy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cancelled trips for driver - Loadzy logistics platform" />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Cancelled Trips - Loadzy Driver</title>
  <link rel="stylesheet" href="driver-shared.css" />
  <link rel="stylesheet" href="canceltrips.css" />
  
</head>
<body>

  <!-- ═══════════════════════════════════════ SIDEBAR ═══ -->
  <aside class="sidebar" role="navigation" aria-label="Driver Navigation">
    <a class="sidebar-logo" href="DriverAccountInfo.html">
      <img src="logo.png" alt="Loadzy Logo" />
      <div class="logo-text">
        <strong>LOADZY</strong>
        <span>LOAD · ROUTE · DELIVER</span>
      </div>
    </a>
    <div class="sidebar-greeting">
      <div class="greeting-label">Logged in as</div>
      <div class="greeting-name" id="sidebar-driver-name">Driver</div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">My Pages</div>
     
      
      <a class="nav-item" href="DriverAccountInfo.html" id="nav-account">
        <img class="nav-icon" src="account (2).png" alt="" />
        Account
      </a>
      <a class="nav-item" href="Dashboard_AssignedTrips-Driver.html" id="nav-assigned">
        <img class="nav-icon" src="notepad.png" alt="" />
        Assigned Trips
      </a>
      <a class="nav-item" href="Dashboard_CompletedTrips-Driver.html" id="nav-completed">
        <img class="nav-icon" src="icon1.png" alt="" />
        Completed Trips
      </a>
      <a class="nav-item active" href="canceltrips.html" id="nav-cancelled">
        <img class="nav-icon" src="icon3.png" alt="" />
        Cancelled Trips
      </a>
      <div class="sidebar-divider"></div>
      <a class="nav-item" href="Helpdesk.html">
        <img class="nav-icon" src="help desk.png" alt="" />
        Help Desk
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="nav-item logout" id="logoutButton">
        <img class="nav-icon" src="logout.png" alt="" />
        Logout
      </div>
    </div>
    </aside>
  <main class="main-content" role="main">
    <div class="page-header">
      <div>
        <h1>Cancelled Trips</h1>
        <p class="page-subtitle">Trips you cancelled from your assigned list</p>
      </div>
      <button class="refresh-btn" onclick="fetchCancelledTrips()" title="Refresh">⟳ Refresh</button>
    </div>
 
 
    <div class="trip-grid" id="cancelled-trips-grid">
      <!-- Populated by DriverCancelledTrips.js -->
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <p>Loading cancelled trips...</p>
      </div>
    </div>

  </main>
  <div id="driver-toast" class="toast-msg"></div>
  <script src="loadzy-api.js"></script>
  <script src="user-header.js"></script>
  <script src="DriverCancelledTrips.js"></script>
</body>
</html>
