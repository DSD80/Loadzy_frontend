<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="logo.png" />
  <title>Cancelled Trips - Loadzy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cancelled trips for driver - Loadzy logistics platform" />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>Cancelled Trips - Loadzy Driver</title>
  <link rel="stylesheet" href="driver-shared.css" />
  <link rel="stylesheet" href="canceltrips.css" />
  
</head>
<body>

  <!-- ═══════════════════════════════════════ SIDEBAR ═══ -->
<img onclick="location.href='DriverAccountInfo.html'" src="account and dash.png" alt="Top Right Image" class="top-right-image">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="logo.png" alt="Loadzy Logo">
      <div class="title">
        <strong>LOADZY</strong><br>
        <span>LOAD. ROUTE. DELIVER</span>
      </div>
    </div> 
  
    <div class="c">
      <div class="nav">
        <div onclick="location.href='Dashboard-Driver.html'" class="nav-item one d-flex flex-row">
          <img src="world.png" class="img1">
          <p class="tt">DASHBOARD</p>
        </div>
        <div onclick="location.href='Dashboard_AssignedTrips-Driver.html'" class="nav-item two d-flex flex-row">
          <img src="notepad.png" class="img1">
          <p class="tt">ASSIGNED TRIPS</p>
        </div>
        <div onclick="location.href='Dashboard_CompletedTrips-Driver.html'" class="nav-item three d-flex flex-row">
          <img src="icon1.png" class="img1">
          <p class="tt">COMPLETED TRIPS</p>
        </div>
        <div onclick="location.href='canceltrips.html'" class="nav-item active five d-flex flex-row">
          <img src="icon3.png" class="img1">
          <p class="tt">CANCELLED TRIPS</p>
        </div>
        <div onclick="location.href='Helpdesk.html'" class="nav-item six d-flex flex-row">
          <img src="help desk.png" class="img1">
          <p class="tt">HELP DESK</p>
        </div>
      </div>

      <div class="bottom-nav">
        <div onclick="location.href='DriverAccountInfo.html'" class="nav-item three d-flex flex-row">
          <img src="account (2).png" class="img1">
          <p class="tt">ACCOUNT</p>
        </div>
        <div onclick="location.href='index.html'" class="nav-item four d-flex flex-row">
          <img src="logout.png" class="img1">
          <p class="tt">LOGOUT</p>
        </div>
      </div>
    </div>
  </div>
  <main class="main-content" role="main">
    <div class="page-header">
      <div>
        <h1>Cancelled Trips</h1>
        <p class="page-subtitle">Trips you cancelled from your assigned list</p>
      </div>
      <button class="refresh-btn" onclick="fetchCancelledTrips()" title="Refresh">⟳ Refresh</button>
    </div>
 
 
    <div class="trip-grid" id="cancelled-trips-grid">
      <!-- Populated by DriverCancelledTrips.js -->
      <div class="empty-state">
        <p>Loading cancelled trips...</p>
      </div>
    </div>

  </main>
  <div id="driver-toast" class="toast-msg"></div>
  <script src="loadzy-api.js"></script>
  <script src="user-header.js"></script>
  <script src="DriverCancelledTrips.js"></script>
</body>
</html>
